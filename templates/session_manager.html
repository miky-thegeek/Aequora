<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aequora - Transaction Importer</title>
    <style>
    :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --danger: #dc2626;
        --bg: #f4f6fb;
        --card: #ffffff;
        --border: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: var(--bg);
        color: var(--text);
    }

    .page {
        max-width: 900px;
        margin: 40px auto;
        padding: 0 20px;
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 5px;
    }

    h2 {
        font-size: 1.2rem;
        margin-bottom: 15px;
    }

    .subtitle {
        color: var(--muted);
        margin-bottom: 30px;
    }

    .actions {
        display: flex;
        gap: 12px;
        margin-bottom: 30px;
        flex-wrap: wrap;
    }

    button {
        padding: 10px 18px;
        border-radius: 6px;
        border: none;
        font-size: 0.95rem;
        cursor: pointer;
        transition: background-color 0.2s ease;
    }

    .btn-primary {
        background-color: var(--primary);
        color: white;
    }

    .btn-primary:hover {
        background-color: var(--primary-hover);
    }

    .btn-secondary {
        background-color: #e5e7eb;
        color: #111827;
    }

    .btn-secondary:hover {
        background-color: #d1d5db;
    }

    .btn-danger {
        background-color: var(--danger);
        color: white;
    }

    .btn-danger:hover {
        background-color: #b91c1c;
    }

    .card {
        background-color: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 30px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }

    .hidden {
        display: none !important;
    }

    .file-upload-group {
        margin-bottom: 25px;
    }

    .file-upload-group > label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
    }

    .file-upload-subgroup {
        border-left: 4px solid var(--primary);
        padding: 12px 12px 12px 16px;
        margin-bottom: 12px;
        border-radius: 6px;
        background-color: #f9fafb;
        position: relative;
    }

    .file-upload-subgroup label {
        font-size: 0.85rem;
        font-weight: 500;
        display: block;
        margin-top: 8px;
    }

    input[type="file"],
    select {
        margin-top: 4px;
        padding: 6px;
        width: 100%;
    }

    .remove-button {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 4px 8px;
        font-size: 0.75rem;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        background-color: var(--danger);
        color: white;
    }

    .remove-button:hover {
        background-color: #b91c1c;
    }

    .form-footer {
        margin-top: 30px;
        text-align: right;
    }
    .loading-overlay {
    position: fixed;
    inset: 0;
    background-color: rgba(15, 23, 42, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    backdrop-filter: blur(3px);
    }

    .loader-card {
        background-color: white;
        padding: 30px 40px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .loader-card p {
        margin-top: 15px;
        font-size: 0.95rem;
        color: #374151;
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 5px solid #e5e7eb;
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        margin: 0 auto;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }
</style>
</head>
<body>
    <div class="page">
        <h1>Aequora</h1>
        <div class="subtitle">Transaction Importer · Session Manager</div>

        <div class="actions">
            <button class="btn-primary" onclick="showForm('newSessionForm')">
                ➕ Nuova sessione
            </button>
            <button class="btn-secondary" onclick="showForm('continueSessionForm')">
                ▶️ Continua sessione
            </button>
        </div>

        <div id="newSessionForm" class="card hidden">
            <h2>Nuova sessione</h2>

            <form method="POST" enctype="multipart/form-data" action="/new_session">

                <!-- Conti correnti -->
                <div class="file-upload-group">
                    <label>Conti Correnti</label>
                    <div id="checkingAccountContainer"></div>
                    <button type="button" class="btn-secondary" onclick="addUploadField('checkingAccount')">
                        + Aggiungi conto
                    </button>
                </div>

                <!-- Carte di debito -->
                <div class="file-upload-group">
                    <label>Carte di Debito</label>
                    <div id="debitCardContainer"></div>
                    <button type="button" class="btn-secondary" onclick="addUploadField('debitCard')">
                        + Aggiungi carta
                    </button>
                </div>

                <!-- PayPal -->
                <div class="file-upload-group">
                    <label>Conti PayPal</label>
                    <div id="paypalContainer"></div>
                    <button type="button" class="btn-secondary" onclick="addUploadField('paypal')">
                        + Aggiungi PayPal
                    </button>
                </div>

                <!-- Prepagate -->
                <div class="file-upload-group">
                    <label>Carte Prepagate</label>
                    <div id="prepaidCardContainer"></div>
                    <button type="button" class="btn-secondary" onclick="addUploadField('prepaidCard')">
                        + Aggiungi prepagata
                    </button>
                </div>

                <div class="form-footer">
                    <button type="submit" class="btn-primary">
                        Avvia sessione
                    </button>
                </div>
            </form>
        </div>

        <div id="continueSessionForm" class="card hidden">
            <h2>Continua sessione precedente</h2>

            <form method="POST" enctype="multipart/form-data" action="/continue_session">
                <label>File CSV sessione precedente</label>
                <input type="file" name="previousSessionFile" accept=".csv" required>

                <div class="form-footer">
                    <button type="submit" class="btn-primary">
                        ▶️ Continua
                    </button>
                </div>
            </form>
        </div>
    </div>
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loader-card">
            <div class="spinner"></div>
            <p>Elaborazione in corso…</p>
        </div>
    </div>

    <script>
        // banksCheckingAccountOptions and banksPrepaidOptions will be populated dynamically from a secure Flask endpoint
        let banksCheckingAccountOptions = [];
        let banksPrepaidOptions = [];
        let checkingAccountCount = 0;

        // Fetch bank list from Flask endpoint (not banks.json directly)
        fetch('/api/banks_with_checking_account')
            .then(response => response.json())
            .then(banks => {
                banksCheckingAccountOptions = banks;
            })
            .catch(err => {
                // fallback to default if fetch fails
                banksCheckingAccountOptions = ['Intesa Sanpaolo', 'Unicredit', 'Banco BPM', 'Banca Sella', 'PostePay'];
            });
        
        fetch('/api/banks_with_prepaid_account')
            .then(response => response.json())
            .then(banks => {
                banksPrepaidOptions = banks;
            })
            .catch(err => {
                // fallback to default if fetch fails
                banksCheckingAccountOptions = ['Intesa Sanpaolo', 'Unicredit', 'Banco BPM', 'Banca Sella', 'PostePay'];
            });

        function showForm(formId) {
            document.getElementById('newSessionForm').classList.add('hidden');
            document.getElementById('continueSessionForm').classList.add('hidden');
            document.getElementById(formId).classList.remove('hidden');
        }

        function createBanksCheckingAccountSelect(name) {
            const select = document.createElement('select');
            select.name = name;
            select.required = true;
            banksCheckingAccountOptions.forEach(banca => {
                const option = document.createElement('option');
                option.value = banca['id'];
                option.textContent = banca['friendly_name'];
                select.appendChild(option);
            });
            return select;
        }

        function createBanksPrepaidAccountSelect(name) {
            const select = document.createElement('select');
            select.name = name;
            select.required = true;
            banksPrepaidOptions.forEach(banca => {
                const option = document.createElement('option');
                option.value = banca['id'];
                option.textContent = banca['friendly_name'];
                select.appendChild(option);
            });
            return select;
        }

        function addUploadField(type) {
            const container = document.getElementById(`${type}Container`);
            const index = container.children.length + 1;
            const div = document.createElement('div');
            div.className = 'file-upload-subgroup';
            const id = `${type}_${index}`;

            let html = `<label>${capitalize(type)} ${index}:</label><input type="file" name="${id}" accept=".csv, .xlsx" required>`;

            if (type === 'checkingAccount' || type === 'prepaidCard') {
                html += `<br><label>Nome Banca:</label> `;
            }

            if (type === 'debitCard' && checkingAccountCount > 0) {
                const selectId = `${type}_association_${index}`;
                html += `<br><label>Associa a:</label> <select name="${selectId}" class="checkingAccountSelect">`;
                for (let i = 1; i <= checkingAccountCount; i++) {
                    html += `<option value="checkingAccount_${i}">Conto Corrente ${i}</option>`;
                }
                html += '</select>';
            }

            if (type === 'checkingAccount') {
                checkingAccountCount++;
            }

            const removeBtn = document.createElement('button');
            removeBtn.textContent = 'Rimuovi';
            removeBtn.className = 'remove-button';
            removeBtn.type = 'button';
            removeBtn.onclick = () => {
                if (type === 'checkingAccount') {
                    checkingAccountCount--;
                    updateAllDebitoSelects();
                }
                div.remove();
            };

            div.innerHTML = html;

            if (type === 'checkingAccount') {
                const bancaSelect = createBanksCheckingAccountSelect(`${id}_bank`);
                div.appendChild(bancaSelect);
            }

            if (type === 'prepaidCard') {
                const bancaSelect = createBanksPrepaidAccountSelect(`${id}_bank`);
                div.appendChild(bancaSelect);
            }

            div.appendChild(removeBtn);
            container.appendChild(div);

            if (type === 'checkingAccount') {
                updateAllDebitoSelects();
            }
        }

        function updateAllDebitoSelects() {
            const selects = document.querySelectorAll('.checkingAccountSelect');
            selects.forEach(select => {
                const currentValue = select.value;
                select.innerHTML = '';
                for (let i = 1; i <= checkingAccountCount; i++) {
                    const option = document.createElement('option');
                    option.value = `checkingAccount_${i}`;
                    option.textContent = `Conto Corrente ${i}`;
                    select.appendChild(option);
                }
                if (currentValue && select.querySelector(`option[value="${currentValue}"]`)) {
                    select.value = currentValue;
                }
            });
        }

        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('loadingOverlay');

            document.querySelectorAll('form').forEach(form => {
                form.addEventListener('submit', () => {
                    overlay.classList.remove('hidden');
                });
            });
        });
    </script>
</body>
</html>
